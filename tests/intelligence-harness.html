<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/web/styles.css"><link rel="stylesheet" href="/web/intelligence.css"><title>Harmony Intelligence QA</title></head>
<body>
<main class="shell"><aside class="sidebar"><nav><button class="nav" data-view="home"><i>🏠</i>Visão geral</button><small>CONTA</small><button class="nav" data-view="profile"><i>👤</i>Meu perfil</button></nav></aside><section class="content"><header class="topbar"><b>Ambiente de validação</b></header><div id="page"></div></section></main><div id="modal"></div><div id="toast"></div>
<script>
const S={profile:{id:'admin',role:'admin',full_name:'Administradora'},view:'home',products:[{id:'p1',name:'Base glicerinada',unit:'quilo',physical_stock:4,reserved_stock:1,minimum_stock:3,safety_stock:6,lead_time_days:30,unit_cost:18,active:true},{id:'p2',name:'Essência floral',unit:'garrafa',physical_stock:12,reserved_stock:0,minimum_stock:4,safety_stock:5,lead_time_days:20,unit_cost:9,active:true}],requests:[{id:'r1',requested_by:'u1',status:'delivered',created_at:new Date().toISOString()},{id:'r2',requested_by:'u2',status:'pending',created_at:new Date().toISOString()}],team:[{id:'u1',role:'collaborator',full_name:'Ana Artesã',department:'Sabonetes'},{id:'u2',role:'collaborator',full_name:'Bia Artesã',department:'Lembranças'}]};
const fake={items:[{request_id:'r1',product_id:'p1',requested_quantity:12,approved_quantity:10,removed_by_admin:false},{request_id:'r2',product_id:'p2',requested_quantity:4,approved_quantity:null,removed_by_admin:false}],suppliers:[{id:'s1',name:'Fornecedor Teste',lead_time_days:15,minimum_order_value:100,active:true,phone:'(11) 99999-0000'}],supplierProducts:[{id:'sp1',supplier_id:'s1',product_id:'p1',last_unit_cost:17,minimum_order_quantity:5,lead_time_days:15,is_preferred:true}],orders:[{id:'o1',protocol:1,supplier_id:'s1',status:'draft',expected_at:null,total_value:170}],orderItems:[{id:'oi1',purchase_order_id:'o1',product_id:'p1',quantity:10,unit_cost:17}],calls:[]};
const $=selector=>document.querySelector(selector);const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
const head=(e,t,s,a='')=>`<header class="page-head"><div><p class="eyebrow">${e}</p><h1>${t}</h1><span>${s}</span></div><div class="head-actions">${a}</div></header>`;
async function rest(path,opt={}){fake.calls.push({type:'rest',path,opt});if(path.startsWith('request_items'))return fake.items;if(path.startsWith('suppliers'))return fake.suppliers;if(path.startsWith('supplier_products'))return fake.supplierProducts;if(path.startsWith('purchase_orders'))return fake.orders;if(path.startsWith('purchase_order_items'))return fake.orderItems;return []}
async function rpc(name,body){fake.calls.push({type:'rpc',name,body});return null}async function loadData(){}function toast(message){document.querySelector('#toast').textContent=message}function renderApp(){document.querySelector('#page').innerHTML='<p>Preparando visualização…</p>'}
</script>
<script src="/web/intelligence.js"></script>
</body></html>
