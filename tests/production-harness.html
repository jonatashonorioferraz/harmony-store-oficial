<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/web/styles.css?v=19"><link rel="stylesheet" href="/web/production-receipts.css?v=19"><title>Harmony Production QA</title></head><body><div id="app"></div><div id="modal"></div><div id="toast"></div><script>
const testRole=new URLSearchParams(location.search).get('role')||'admin';
const profiles={admin:{id:'admin',role:'admin',full_name:'Administradora'},receiver:{id:'receiver',role:'receiver',full_name:'Conferente Rosa'},collaborator:{id:'u1',role:'collaborator',full_name:'Ana Artesã'}};
const S={profile:profiles[testRole],view:'home',team:[],products:[],requests:[]};
const fake={models:[{id:'m1',name:'Coração P',colors:['Rosa','Azul'],rate_per_100:testRole==='receiver'?null:2.5,image_path:null,notes:null,active:true},{id:'m2',name:'Flor M',colors:['Branco'],rate_per_100:testRole==='receiver'?null:2.5,image_path:null,notes:null,active:true}],workers:[{id:'u1',full_name:'Ana Artesã',department:'Produção',role:'collaborator'},{id:'u2',full_name:'Bia Artesã',department:'Produção',role:'collaborator'},{id:'receiver',full_name:'Conferente Rosa',department:'Recebimento',role:'receiver'}],receipts:[{id:'r1',protocol:1,worker_id:'u1',worker_name:'Ana Artesã',model_id:'m1',model_name:'Coração P',color:'Rosa',declared_quantity:163,quantity:150,quantity_difference:-13,box_reference:'Caixa 12',received_on:'2026-07-15',received_by:'receiver',receiver_name:'Conferente Rosa',notes:null,closing_id:null,amount:testRole==='receiver'?null:3.75},{id:'r2',protocol:2,worker_id:'u2',worker_name:'Bia Artesã',model_id:'m2',model_name:'Flor M',color:'Branco',declared_quantity:75,quantity:80,quantity_difference:5,box_reference:'Lote B-4',received_on:'2026-07-16',received_by:'admin',receiver_name:'Administradora',notes:null,closing_id:'c2',amount:testRole==='receiver'?null:2}],closings:[{id:'c2',protocol:2,worker_id:'u2',worker_name:'Bia Artesã',week_start:'2026-07-13',week_end:'2026-07-19',total_quantity:80,total_amount:testRole==='receiver'?null:2,status:'closed',closed_at:new Date().toISOString(),paid_at:null,payment_notes:null}],calls:[]};
window.__qaFake=fake;
if(testRole==='collaborator'){fake.receipts=fake.receipts.filter(x=>x.worker_id==='u1');fake.closings=[{id:'c1',protocol:1,worker_id:'u1',worker_name:'Ana Artesã',week_start:'2026-07-13',week_end:'2026-07-19',total_quantity:150,total_amount:3.75,status:'paid',closed_at:new Date().toISOString(),paid_at:new Date().toISOString(),payment_notes:'Pagamento semanal'}];S.team=[S.profile]}else S.team=fake.workers;
const $=selector=>document.querySelector(selector);const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
const head=(e,t,s,a='')=>`<header class="page-head"><div><p class="eyebrow">${e}</p><h1>${t}</h1><span>${s}</span></div><div class="head-actions">${a}</div></header>`;
function toast(message){document.querySelector('#toast').textContent=message}
window.print=()=>document.body.dataset.printed='true';
async function rest(path,opt={}){fake.calls.push({type:'rest',path,opt});return []}
async function rpc(name,body={}){fake.calls.push({type:'rpc',name,body});document.body.dataset.lastRpc=JSON.stringify({name,body});if(/^(create|update|delete)_finished_production_collection$/.test(name))document.body.dataset.lastWriteRpc=JSON.stringify({name,body});if(name==='list_finished_product_models')return fake.models;if(name==='list_finished_production_receipts')return fake.receipts;if(name==='list_production_weekly_closings')return fake.closings;if(name==='list_production_workers')return fake.workers;if(name==='admin_production_statement')return [{closing_id:'c2',protocol:2,worker_name:'Bia Artesã',week_start:'2026-07-13',week_end:'2026-07-19',receipt_protocol:2,received_on:'2026-07-16',box_reference:'Lote B-4',model_name:'Flor M',color:'Branco',declared_quantity:75,quantity:80,quantity_difference:5,rate_per_100:2.5,line_amount:2,total_quantity:80,total_amount:2,status:'closed',paid_at:null}];return null}
function renderApp(){const receiver=testRole==='receiver',admin=testRole==='admin';document.querySelector('#app').innerHTML=`<main class="shell"><aside class="sidebar"><div class="account"><i class="avatar">HA</i><span><b>${S.profile.full_name}</b><small>${admin?'Administradora':'Colaboradora'}</small></span></div><nav><small>PRINCIPAL</small><button class="nav" data-view="home"><i>🏠</i>Visão geral</button>${!admin?'<button class="nav" data-view="new"><i>➕</i>Nova solicitação</button>':''}<button class="nav" data-view="requests"><i>📋</i>${admin?'Solicitações':'Meus pedidos'}</button><small>CONTA</small><button class="nav" data-view="profile"><i>👤</i>Meu perfil</button></nav></aside><section class="content"><header class="topbar"><b>Ambiente de validação</b></header><div id="page"><p>Preparando visualização…</p></div></section></main>`}
renderApp();
</script><script src="/web/enhancements.js"></script><script src="/web/production-receipts.js"></script></body></html>
