<!doctype html>
<html lang="pt-BR" data-role="collaborator">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Harmony — QA da troca de senha</title>
  <link rel="stylesheet" href="../web/styles.css">
</head>
<body>
  <div id="app">
    <main class="password-gate">
      <section class="password-gate-card">
        <img src="../web/brand-mark.png" alt="Harmony Store Oficial">
        <p class="eyebrow">PRIMEIRO ACESSO SEGURO</p>
        <h1>Crie sua nova senha</h1>
        <p>Olá, <b>Ana</b>. A senha entregue pela administradora é temporária. Escolha uma senha pessoal para continuar.</p>
        <form>
          <label>Nova senha<div class="password"><input type="password" minlength="10" maxlength="72" autocomplete="new-password" required><button type="button">Ver</button></div></label>
          <label>Confirmar nova senha<div class="password"><input type="password" minlength="10" maxlength="72" autocomplete="new-password" required><button type="button">Ver</button></div></label>
          <div class="password-rules"><b>Sua senha precisa ter:</b><span>10 ou mais caracteres</span><span>Letra maiúscula e minúscula</span><span>Número e símbolo</span></div>
          <button class="primary full">Salvar nova senha e continuar</button>
        </form>
        <button class="outline password-gate-logout">Sair e trocar de conta</button>
        <small class="safe">A administradora não verá sua nova senha.</small>
      </section>
    </main>
  </div>
</body>
</html>
