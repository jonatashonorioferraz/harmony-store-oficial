ius:9px;object-fit:cover}.photo{display:grid;place-items:center;color:#fff;font-size:20px}.product h3{font-size:11px;margin:5px 0}.product p,.product small,.product b{font-size:7px;color:var(--muted)}.product b{display:block;margin-top:7px;color:#528166}.qty{grid-column:1/3;display:grid;grid-template-columns:35px 1fr 35px;border:1px solid var(--line);border-radius:8px;overflow:hidden}.qty button{border:0;background:#fff6fa;color:var(--rose)}.qty input{border:0;text-align:center;width:100%}.summary{position:sticky;top:78px;padding:20px}.summary h2{font:22px Georgia,serif}.summary-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:8px}.summary textarea{width:100%;min-height:75px;margin-top:17px;padding:10px;border:1px solid var(--line);border-radius:8px}.full{width:100%;margin-top:14px}.table{overflow:auto}.table header,.table article{display:grid;grid-template-columns:1.7fr repeat(4,1fr) 110px;gap:12px;align-items:center;min-width:760px;padding:12px 17px}.table header{background:#fff7fa;color:#9b808c;font-size:7px;font-weight:900;text-transform:uppercase}.table article{min-height:64px;border-top:1px solid var(--line);font-size:9px}.table-product{display:flex;align-items:center;gap:10px}.table-product img,.table-product i{width:37px;height:37px;border-radius:8px;object-fit:cover}.table-product i{display:block}.table-product b,.table-product small{display:block}.table-product small{color:var(--muted);margin-top:4px}.actions{display:flex;gap:5px}.actions button{border:0;background:none;color:var(--dark);font-size:8px;font-weight:800}.team{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.person{display:grid;grid-template-columns:46px 1fr auto;gap:11px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff}.person h3{font-size:10px;margin:0}.person p,.person small{display:block;font-size:7px;color:var(--muted);margin:4px 0}.profile{max-width:680px;padding:23px}.prof <body><div id="app"></div><div id="modal"></div><div id="toast"></div>
<script>
const API='https://tyzfznwvjzmudxtcbbaf.supabase.co', KEY='sb_publishable_Pg54r3i2MT5snGLhT8EQbQ_snr-KfVC';
const S={session:null,profile:null,products:[],requests:[],team:[],categories:[],view:'home',cart:{}};
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function email(login){login=login.trim().toLowerCase();return login.includes('@')?login:login+'@auth.harmonylembrancinhas.com.br'}
async function json(res){let d=await res.json().catch(()=>({}));if(!res.ok)throw Error(d.msg||d.message||d.error_description||d.error||'Não foi possível concluir.');return d}
async function rest(path,opt={}){return json(await fetch(API+'/rest/v1/'+path,{...opt,headers:{apikey:KEY,Authorization:'Bearer '+S.session.access_token,'Content-Type':'application/json',...(opt.headers||{})}}))}
async function login(user,password){let d=await json(await fetch(API+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email(user),password})}));d.expires_at=Math.floor(Date.now()/1000)+d.expires_in;localStorage.setItem('harmony.session',JSON.stringify(d));S.session=d;await loadAccount()}
async function restore(){try{let d=JSON.parse(localStorage.getItem('harmony.session'));if(!d)return false;if(d.expires_at<Math.floor(Date.now()/1000)+60){d=await json(await fetch(API+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:d.refresh_token})}));d.expires_at=Math.floor(Date.now()/1000)+d.expires_in;localStorage.setItem('harmony.session',JSON.stringify(d))}S.session=d;await loadAccount();return true}catch(e){localStorage.removeItem('harmony.session');return false}}
async function loadAccount(){let p=await rest('profiles?id=eq.'+S.session.user.id+'&select=*');if(!p[0]||p[0].status!=='active')throw Error('Cadastro inativo.');S.profile=p[0];await loadData()}
async function loadData(){let [p,r,c]=await Promise.all([rest('products?select=*&order=name.asc'),rest('requests?select=*&order=created_at.desc'),rest('categories?select=*&order=name.asc')]);S.products=p;S.requests=r;S.categories=c;if(S.profile.role==='admin')S.team=await rest('profiles?select=*&order=full_name.asc')}
function logout(){fetch(API+'/auth/v1/logout',{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+S.session.access_token}}).catch(()=>{});localStorage.removeItem('harmony.session');S.session=S.profile=null;renderLogin()}
function initials(n){return n.split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function toast(t){$('#toast').innerHTML='<div class="toast">✓ '+esc(t)+'</div>';setTimeout(()=>$('#toast').innerHTML='',3000)}
function renderLogin(){document.getElementById('app').innerHTML=`<main class="login"><section class="story"><p class="eyebrow">HARMONY STORE OFICIAL</p><h1>Cuidado artesanal,<br><em>gestão impecável.</em></h1><p>Materiais, solicitações e entregas reunidos em um ambiente seguro, criado para a rotina da nossa produção.</p><div class="artisan"><i>✦</i><span><b>Feito para a nossa essência</b><small>Organização leve, delicada e eficiente.</small></span></div></section><section class="login-panel"><div class="login-box"><img src="logo.jpg" alt="Harmony Store Oficial"><p class="eyebrow">ACESSO RESTRITO</p><h2>Bem-vinda</h2><p>Use o login criado pela administradora.</p><form id="loginForm"><label>Login<input name="user" autocomplete="username" placeholder="seu.login" required></label><label>Senha<div class="password"><input name="pass" type="password" autocomplete="current-password" required><button type="button" id="showPass">Ver</button></div></label><div id="loginError"></div><button class="primary">Entrar no sistema</button></form><small class="safe">Seus dados são protegidos. Nunca compartilhe sua senha.</small></div></section></main>`;$('#showPass').onclick=()=>{let i=$('[name=pass]');i.type=i.type==='password'?'text':'password';$('#showPass').textContent=i.type==='password'?'Ver':'Ocultar'};$('#loginForm').onsubmit=async e=>{e.preventDefault();let b=e.submitter;b.disabled=true;b.textContent='Entrando…';try{await login(e.target.user.value,e.target.pass.value);renderApp()}catch(x){$('#loginError').innerHTML='<div class="error">'+esc(/invalid login/i.test(x.message)?'Login ou senha incorretos.':x.message)+'</div>'}finally{b.disabled=false;b.textContent='Entrar no sistema'}}}
function nav(v,i,l){return `<button class="nav ${S.view===v?'active':''}" data-view="${v}"><i>${i}</i>${l}</button>`}
function renderApp(){let a=S.profile.role==='admin';document.getElementById('app').innerHTML=`<main class="shell"><aside class="sidebar"><button class="brand" data-view="home"><img src="logo.jpg" alt="Harmony Store"><span><b>Harmony Store</b><small>Gestão de produção</small></span></button><div class="account"><i class="avatar">${initials(S.profile.full_name)}</i><span><b>${esc(S.profile.full_name)}</b><small>${a?'Administradora':'Colaboradora'}</small></span></div><nav><small>PRINCIPAL</small>${nav('home','⌂','Visão geral')}${!a?nav('new','＋','Nova solicitação'):''}${nav('requests','▤',a?'Solicitações':'Meus pedidos')}${a?'<small>GESTÃO</small>'+nav('products','◇','Produtos e estoque')+nav('team','♙','Colaboradoras'):''}<small>CONTA</small>${nav('profile','○','Meu perfil')}</nav><button class="outline logout" id="logout">Sair do sistema</button></aside><section class="content"><header class="topbar"><b>✦ Ambiente oficial Harmony</b><span>Dados protegidos e sincronizados</span></header><div id="page"></div></section></main>`;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{S.view=b.dataset.view;renderApp()});$('#logout').onclick=logout;renderPage()}
function head(e,t,s,action=''){return `<header class="page-head"><div><p class="eyebrow">${e}</p><h1>${t}</h1><span>${s}</span></div>${action}</header>`}
function requestRows(){if(!S.requests.length)return '<div class="empty">Nenhuma solicitação encontrada.</div>';let labels={pending:'Pendente',separating:'Em separação',scheduled:'Agendada',delivered:'Entregue',cancelled:'Cancelada'};return '<div class="requests">'+S.requests.map(r=>`<article><div><small>SOLICITAÇÃO</small><b>#${String(r.protocol).padStart(4,'0')}</b></div><div><strong>${esc(r.notes||'Materiais para produção')}</strong><small>${new Date(r.created_at).toLocaleDateString('pt-BR')}</small></div><div><small>DATA PROGRAMADA</small><b>${r.scheduled_for?new Date(r.scheduled_for).toLocaleDateString('pt-BR'):'A definir'}</b></div><span class="badge ${r.status}">${labels[r.status]||r.status}</span></article>`).join('')+'</div>'}
function renderPage(){let p=$('#page'),a=S.profile.role==='admin';if(S.view==='home'){let low=S.products.filter(x=>+x.physical_stock-+x.reserved_stock<=+x.minimum_stock).length;p.innerHTML=`<div class="page">${head('VISÃO GERAL','Olá, '+esc(S.profile.full_name.split(' ')[0])+'.',a?'Aqui está o resumo da operação da Harmony Store.':'Acompanhe seus pedidos e solicite materiais.')}<div class="metrics"><article class="metric"><b>${S.requests.filter(r=>!['delivered','cancelled'].includes(r.status)).length}</b><p>Solicitações em andamento</p></article><article class="metric"><b>${S.requests.filter(r=>r.status==='pending').length}</b><p>Aguardando separação</p></article><article class="metric"><b>${S.requests.filter(r=>r.status==='delivered').length}</b><p>Entregas concluídas</p></article>${a?`<article class="metric"><b>${low}</b><p>Estoque baixo</p></article>`:''}</div><section class="card"><div class="card-head"><div><h2>Solicitações recentes</h2><p>Movimentações mais atuais</p></div></div>${requestRows()}</section></div>`}
else if(S.view==='requests')p.innerHTML=`<div class="page">${head('OPERAÇÃO',a?'Solicitações':'Meus pedidos',a?'Analise e acompanhe os pedidos recebidos.':'Somente as suas solicitações aparecem aqui.')}<section class="card">${requestRows()}</section></div>`;
else if(S.view==='new')renderNew(p);else if(S.view==='products')renderProducts(p);else if(S.view==='team')p.innerHTML=`<div class="page">${head('CADASTROS','Equipe Harmony','Colaboradoras e administradoras cadastradas.')}<div class="team">${S.team.map(x=>`<article class="person"><i class="avatar">${initials(x.full_name)}</i><div><h3>${esc(x.full_name)}</h3><p>${esc(x.department||(x.role==='admin'?'Administração':'Produção'))}</p><small>${esc(x.username)} · ${esc(x.harmony_id)}</small></div><span class="badge ${x.status}">${x.status==='active'?'Ativo':'Inativo'}</span></article>`).join('')}</div></div>`;else p.innerHTML=`<div class="page">${head('MINHA CONTA','Meu perfil','Informações vinculadas ao seu acesso.')}<section class="card profile"><div class="profile-head"><i class="avatar">${initials(S.profile.full_name)}</i><div><h2>${esc(S.profile.full_name)}</h2><p>${a?'Administradora':'Colaboradora'}</p></div></div><dl><div><dt>Login</dt><dd>${esc(S.profile.username)}</dd></div><div><dt>Harmony ID</dt><dd>${esc(S.profile.harmony_id)}</dd></div><div><dt>Setor</dt><dd>${esc(S.profile.department||'Não informado')}</dd></div><div><dt>Situação</dt><dd>Ativo</dd></div></dl><button class="outline" id="profileLogout">Sair do aplicativo</button></section></div>`;if($('#profileLogout'))$('#profileLogout').onclick=logout}
function renderNew(p){let selected=S.products.filter(x=>(S.cart[x.id]||0)>0);p.innerHTML=`<div class="page">${head('SOLICITAÇÃO','Escolha seus materiais','A empresa definirá a data e se será entrega ou coleta.')}<div class="catalog-layout"><section class="products-grid">${S.products.filter(x=>x.active).map(x=>`<article class="product">${x.image_path?`<img src="${API}/storage/v1/object/public/product-images/${esc(x.image_path)}" alt="${esc(x.name)}">`:`<i class="photo" style="background:${esc(x.color||'#f3b6d2')}">✦</i>`}<div><small>${esc(x.unit)}</small><h3>${esc(x.name)}</h3><p>${esc(x.description||x.color||'Material de produção')}</p><b>${+x.physical_stock-+x.reserved_stock} disponíveis</b></div><div class="qty"><button data-minus="${x.id}">−</button><input data-qty="${x.id}" type="number" min="0" step="0.001" value="${S.cart[x.id]||0}"><button data-plus="${x.id}">＋</button></div></article>`).join('')||'<div class="empty">Nenhum produto disponível.</div>'}</section><aside class="card summary"><p class="eyebrow">SEU PEDIDO</p><h2>${selected.length} produtos</h2>${selected.map(x=>`<div class="summary-line"><span>${esc(x.name)}</span><b>${S.cart[x.id]} ${esc(x.unit)}</b></div>`).join('')}<textarea id="reqNotes" placeholder="Finalidade, lote ou detalhe importante…"></textarea><button class="primary full" id="sendReq" ${selected.length?'':'disabled'}>Enviar solicitação</button></aside></div></div>`;document.querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{S.cart[b.dataset.minus]=Math.max(0,(S.cart[b.dataset.minus]||0)-1);renderNew(p)});document.querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{S.cart[b.dataset.plus]=(S.cart[b.dataset.plus]||0)+1;renderNew(p)});document.querySelectorAll('[data-qty]').forEach(i=>i.onchange=()=>{S.cart[i.dataset.qty]=Math.max(0,+i.value);renderNew(p)});$('#sendReq').onclick=async()=>{let b=$('#sendReq');b.disabled=true;try{let r=await rest('requests',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({requested_by:S.profile.id,notes:$('#reqNotes').value,status:'pending'})});await rest('request_items',{method:'POST',body:JSON.stringify(selected.map(x=>({request_id:r[0].id,product_id:x.id,requested_quantity:S.cart[x.id]})))});S.cart={};await loadData();S.view='requests';renderApp();toast('Solicitação enviada com sucesso.')}catch(e){alert(e.message);b.disabled=false}}}
function renderProducts(p){p.innerHTML=`<div class="page">${head('GESTÃO','Produtos e estoque','Cadastre, edite e controle as matérias-primas.','<button class="primary" id="newProduct">＋ Cadastrar produto</button>')}<section class="card table"><header><span>Produto</span><span>Estoque físico</span><span>Reservado</span><span>Disponível</span><span>Situação</span><span>Ações</span></header>${S.products.map(x=>{let av=+x.physical_stock-+x.reserved_stock;return `<article><span class="table-product">${x.image_path?`<img src="${API}/storage/v1/object/public/product-images/${esc(x.image_path)}" alt="">`:`<i style="background:${esc(x.color||'#f3c5da')}"></i>`}<b>${esc(x.name)}<small>${esc(x.unit)}</small></b></span><span>${x.physical_stock}</span><span>${x.reserved_stock}</span><b>${av}</b><span class="badge ${av<=+x.minimum_stock?'low':'active'}">${av<=+x.minimum_stock?'Estoque baixo':'Normal'}</span><span class="actions"><button data-edit="${x.id}">Editar</button><button data-del="${x.id}">Excluir</button></span></article>`}).join('')||'<div class="empty">Nenhum produto cadastrado.</div>'}</section></div>`;$('#newProduct').onclick=()=>productModal();document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>productModal(S.products.find(x=>x.id===b.dataset.edit)));document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{if(!confirm('Excluir este produto?'))return;try{await rest('products?id=eq.'+b.dataset.del,{method:'DELETE'});await loadData();renderProducts(p);toast('Produto excluído.')}catch(e){alert('Não foi possível excluir: '+e.message)}})}
function productModal(x={}){let edit=!!x.id;$('#modal').innerHTML=`<div class="modal"><form class="modal-box" id="productForm"><div class="modal-head"><div><p class="eyebrow">PRODUTO</p><h2>${edit?'Editar produto':'Novo produto'}</h2></div><button type="button" id="closeModal">×</button></div><div class="form-grid"><label>Nome<input name="name" value="${esc(x.name||'')}" required></label><label>Categoria<select name="category_id"><option value="">Sem categoria</option>${S.categories.map(c=>`<option value="${c.id}" ${x.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></label><label>Unidade<select name="unit">${['unidade','quilo','cm','metro','rolo','garrafa','caixa'].map(u=>`<option ${x.unit===u?'selected':''}>${u}</option>`).join('')}</select></label><label>Cor<input name="color" value="${esc(x.color||'')}"></label><label>Estoque físico<input name="physical_stock" type="number" min="0" step="0.001" value="${x.physical_stock||0}" required></label><label>Reservado<input name="reserved_stock" type="number" min="0" step="0.001" value="${x.reserved_stock||0}" required></label><label>Estoque mínimo<input name="minimum_stock" type="number" min="0" step="0.001" value="${x.minimum_stock||0}" required></label><label>Foto<input name="photo" type="file" accept="image/jpeg,image/png,image/webp"></label><label class="wide">Descrição<textarea name="description">${esc(x.description||'')}</textarea></label><div class="form-actions"><button type="button" class="outline" id="cancelModal">Cancelar</button><button class="primary">Salvar produto</button></div></div></form></div>`;let close=()=>$('#modal').innerHTML='';$('#closeModal').onclick=$('#cancelModal').onclick=close;$('#productForm').onsubmit=async e=>{e.preventDefault();let f=new FormData(e.target),data={name:f.get('name'),category_id:f.get('category_id')||null,unit:f.get('unit'),color:f.get('color')||null,description:f.get('description')||null,physical_stock:+f.get('physical_stock'),reserved_stock:+f.get('reserved_stock'),minimum_stock:+f.get('minimum_stock'),active:true};if(data.reserved_stock>data.physical_stock)return alert('O reservado não pode ser maior que o estoque físico.');let file=f.get('photo');try{if(file&&file.size){if(file.size>2097152)throw Error('A foto deve ter no máximo 2 MB.');let path=S.profile.id+'/'+crypto.randomUUID()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'-');await json(await fetch(API+'/storage/v1/object/product-images/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+S.session.access_token,'Content-Type':file.type},body:file}));data.image_path=path}await rest(edit?'products?id=eq.'+x.id:'products',{method:edit?'PATCH':'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(data)});close();await loadData();renderApp();toast(edit?'Produto atualizado.':'Produto cadastrado.')}catch(err){alert(err.message)}}}
(async()=>{if(await restore())renderApp();else renderLogin()})();
</script></body></html>
